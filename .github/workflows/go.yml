name: Go CI

on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - "Makefile"
      - ".github/workflows/go.yml"
  pull_request:
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - "Makefile"
      - ".github/workflows/go.yml"

# Cancel superseded runs on the same ref to avoid burning minutes on stale commits.
concurrency:
  group: go-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: vet · lint · build · test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go mod verify
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
          # Action manages its own analysis cache; setup-go handles module cache.
          skip-cache: false

      - name: build
        run: go build -trimpath ./...

      - name: test
        run: go test -race -count=1 ./internal/... ./pkg/... ./cmd/...
