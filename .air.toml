root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/forgebox ./cmd/forgebox"
  bin = "./tmp/forgebox serve"
  include_ext = ["go", "yaml"]
  exclude_dir = ["tmp", "web", "node_modules", "rootfs", "deploy", "desktop", "docs", "test"]
  delay = 1000

[log]
  time = false

[misc]
  clean_on_exit = true
